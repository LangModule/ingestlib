# Retrieval eval ground truth over the fixture corpus (tests/data/pdf).
#
# Ground truth is (doc, pages, keywords) — never chunk IDs, which change
# whenever splitting logic changes. A retrieved chunk is a hit when it comes
# from the right document, overlaps the expected pages, and contains at
# least one keyword (case-insensitive, matched against chunk markdown+text).
#
# Mix by design: semantic questions, exact-number lookups, exact-token
# lexical questions (the hybrid/sparse exercisers), and chart-derived
# answers (test parse's chart-to-data-table enrichment).

