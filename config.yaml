aws:
  profile: ram-bedrock
  region: us-east-1
  account_id: "656077800096"

bedrock:
  llm_model_id: us.amazon.nova-2-lite-v1:0
  embedding_model_id: amazon.nova-2-multimodal-embeddings-v1:0
  rerank_model_id: amazon.rerank-v1:0
  rerank_region: us-west-2                                # amazon.rerank-v1:0 not available in us-east-1

jina:
  base_url: https://api.jina.ai/v1
  rerank_model_id: jina-reranker-v3                     # API key comes from JINA_API_KEY in .env

paddle_vl:
  backend: mlx-vlm-server                               # mlx-vlm-server (Apple Silicon) | vllm-server (NVIDIA)
  server_url: http://localhost:8111/
  api_model_name: PaddlePaddle/PaddleOCR-VL-1.6

s3:
  bucket: ingestlib                                     # S3 names are GLOBAL — if taken by another account, pick a variant

vector_store: pinecone                                  # which connector ingest/retrieve use: pinecone | qdrant

pinecone:
  index_name: ingestlib                                 # created on first upsert if absent
  sparse_index_name: ingestlib-sparse                   # lexical half of hybrid search, same bootstrap
  sparse_model_id: pinecone-sparse-english-v0           # hosted sparse embeddings — no corpus state to manage
  cloud: aws                                            # serverless index location
  region: us-east-1                                     # API key comes from PINECONE_API_KEY in .env

qdrant:
  collection_name: ingestlib                            # created on first upsert if absent
                                                        # URL + API key come from QDRANT_URL / QDRANT_API_KEY in .env
